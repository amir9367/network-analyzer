<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NetAnalyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --accent:  #58a6ff;
    --red:     #f85149;
    --green:   #3fb950;
    --yellow:  #d29922;
    --text:    #c9d1d9;
    --muted:   #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  #status {
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  #status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1 } 50% { opacity:.4 }
  }

  /* ── Layout ──────────────────────────────── */
  main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .row { display: grid; gap: 16px; margin-bottom: 16px; }
  .row-4 { grid-template-columns: repeat(4, 1fr); }
  .row-2 { grid-template-columns: 2fr 1fr; }
  .row-1 { grid-template-columns: 1fr; }

  /* ── Card ────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .card-title {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted);
    margin-bottom: 8px;
  }
  .big-num {
    font-size: 32px; font-weight: 700;
    color: #fff; line-height: 1.1;
  }
  .big-num sup { font-size: 14px; color: var(--muted); font-weight: 400; }

  /* ── Chart containers ────────────────────── */
  .chart-box { position: relative; height: 220px; }

  /* ── Alert feed ──────────────────────────── */
  #alert-list {
    list-style: none;
    display: flex; flex-direction: column; gap: 6px;
    max-height: 340px; overflow-y: auto;
  }
  #alert-list:empty::after {
    content: "No alerts yet.";
    color: var(--muted); font-size: 13px;
  }
  #alert-list li {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
  }
  .badge {
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .badge-scan  { background: rgba(248,81,73,.15); color: var(--red); }
  .badge-spike { background: rgba(210,153,34,.15); color: var(--yellow); }
  .alert-src  { font-family: monospace; color: var(--accent); }
  .alert-detail { color: var(--muted); }
  .alert-ts   { color: var(--muted); white-space: nowrap; }

  @media (max-width: 768px) {
    .row-4 { grid-template-columns: repeat(2, 1fr); }
    .row-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Net<span>Analyzer</span></h1>
  <div id="status"><span class="dot"></span><span id="last-refresh">—</span></div>
</header>

<main>
  <!-- KPI row -->
  <div class="row row-4">
    <div class="card">
      <div class="card-title">Total Packets</div>
      <div class="big-num" id="kpi-total">—</div>
    </div>
    <div class="card">
      <div class="card-title">TCP</div>
      <div class="big-num" id="kpi-tcp">—</div>
    </div>
    <div class="card">
      <div class="card-title">UDP</div>
      <div class="big-num" id="kpi-udp">—</div>
    </div>
    <div class="card">
      <div class="card-title">Active Alerts</div>
      <div class="big-num" id="kpi-alerts" style="color:var(--red)">—</div>
    </div>
  </div>

  <!-- Charts row -->
  <div class="row row-2">
    <div class="card">
      <div class="card-title">Traffic Timeline (packets / min)</div>
      <div class="chart-box"><canvas id="chart-timeline"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Protocol Breakdown</div>
      <div class="chart-box"><canvas id="chart-proto"></canvas></div>
    </div>
  </div>

  <!-- Top IPs + Alerts row -->
  <div class="row row-2">
    <div class="card">
      <div class="card-title">Alert Feed</div>
      <ul id="alert-list"></ul>
    </div>
    <div class="card">
      <div class="card-title">Top Source IPs</div>
      <div class="chart-box"><canvas id="chart-ips"></canvas></div>
    </div>
  </div>
</main>

<script>
  // ── Chart defaults ─────────────────────────────────────────────────────────
  Chart.defaults.color = '#8b949e';
  Chart.defaults.borderColor = '#30363d';
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';

  const ACCENT  = '#58a6ff';
  const RED     = '#f85149';
  const YELLOW  = '#d29922';
  const COLORS  = ['#58a6ff','#3fb950','#d29922','#f85149','#a371f7',
                   '#79c0ff','#56d364','#e3b341','#ff7b72','#bc8cff'];

  const makeChart = (id, cfg) => new Chart(document.getElementById(id), cfg);

  // ── Timeline ───────────────────────────────────────────────────────────────
  const timelineChart = makeChart('chart-timeline', {
    type: 'line',
    data: { labels: [], datasets: [{
      label: 'Packets',
      data: [], fill: true,
      borderColor: ACCENT,
      backgroundColor: 'rgba(88,166,255,.08)',
      tension: 0.3, pointRadius: 2,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 6 } },
        y: { beginAtZero: true },
      },
    },
  });

  // ── Protocol doughnut ──────────────────────────────────────────────────────
  const protoChart = makeChart('chart-proto', {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: COLORS,
      borderWidth: 2, borderColor: '#161b22' }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { padding: 12 } } },
    },
  });

  // ── Top IPs bar ────────────────────────────────────────────────────────────
  const ipChart = makeChart('chart-ips', {
    type: 'bar',
    data: { labels: [], datasets: [{
      label: 'Packets', data: [],
      backgroundColor: 'rgba(88,166,255,.6)',
      borderRadius: 4,
    }]},
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true } },
    },
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  const fmt  = n => n >= 1_000_000 ? (n/1_000_000).toFixed(1)+'M'
                 : n >= 1_000      ? (n/1_000).toFixed(1)+'k'
                 : String(n);
  const ts   = s => s.slice(11, 16);   // "HH:MM" from ISO string

  // ── Fetch & render ─────────────────────────────────────────────────────────
  async function refresh() {
    const [stats, alerts] = await Promise.all([
      fetch('/api/stats').then(r => r.json()),
      fetch('/api/alerts').then(r => r.json()),
    ]);

    // KPIs
    document.getElementById('kpi-total').textContent = fmt(stats.total);
    const tcp = stats.protocols.find(p => p.protocol === 'TCP')?.n ?? 0;
    const udp = stats.protocols.find(p => p.protocol === 'UDP')?.n ?? 0;
    document.getElementById('kpi-tcp').textContent    = fmt(tcp);
    document.getElementById('kpi-udp').textContent    = fmt(udp);
    document.getElementById('kpi-alerts').textContent = alerts.length;

    // Timeline
    timelineChart.data.labels   = stats.timeline.map(r => ts(r.minute));
    timelineChart.data.datasets[0].data = stats.timeline.map(r => r.n);
    timelineChart.update('none');

    // Protocol
    protoChart.data.labels = stats.protocols.map(p => p.protocol);
    protoChart.data.datasets[0].data = stats.protocols.map(p => p.n);
    protoChart.update('none');

    // Top IPs
    ipChart.data.labels = stats.top_ips.map(r => r.src_ip);
    ipChart.data.datasets[0].data = stats.top_ips.map(r => r.n);
    ipChart.update('none');

    // Alert feed
    const list = document.getElementById('alert-list');
    list.innerHTML = '';
    alerts.slice(0, 30).forEach(a => {
      const li    = document.createElement('li');
      const cls   = a.alert_type === 'PORT_SCAN' ? 'badge-scan' : 'badge-spike';
      li.innerHTML = `
        <span class="badge ${cls}">${a.alert_type.replace('_',' ')}</span>
        <span><span class="alert-src">${a.src_ip}</span>
              <span class="alert-detail"> — ${a.detail}</span></span>
        <span class="alert-ts">${ts(a.timestamp)}</span>`;
      list.appendChild(li);
    });

    document.getElementById('last-refresh').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  }

  refresh();
  setInterval(refresh, 5000);
</script>
</body>
</html>
