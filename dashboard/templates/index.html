<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetAnalyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #4f8ef7;
      --warn: #f7a94f;
      --danger: #f75f5f;
      --text: #e2e8f0;
      --muted: #6b7280;
      --radius: 10px;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .04em; }
    header h1 span { color: var(--accent); }
    #status { font-size: .8rem; color: var(--muted); }
    #status.live::before { content: '● '; color: #4ade80; }

    main { padding: 1.5rem 2rem; display: grid; gap: 1.25rem; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem;
    }
    .card h2 { font-size: .75rem; font-weight: 600; text-transform: uppercase;
               letter-spacing: .08em; color: var(--muted); margin-bottom: 1rem; }

    .stat-val { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: .8rem; color: var(--muted); margin-top: .25rem; }

    canvas { max-height: 220px; }

    /* top IPs table */
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { text-align: left; color: var(--muted); font-weight: 500;
         padding: .4rem .6rem; border-bottom: 1px solid var(--border); }
    td { padding: .4rem .6rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    /* alerts */
    #alert-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; max-height: 280px; overflow-y: auto; }
    #alert-list li {
      display: flex; gap: .75rem; align-items: flex-start;
      padding: .6rem .75rem; border-radius: 6px;
      background: rgba(247,95,95,.08); border-left: 3px solid var(--danger);
      font-size: .82rem;
    }
    #alert-list li.spike { background: rgba(247,169,79,.08); border-left-color: var(--warn); }
    #alert-list li .badge {
      font-size: .7rem; font-weight: 700; padding: .15rem .4rem;
      border-radius: 4px; background: var(--danger); color: #fff;
      white-space: nowrap; flex-shrink: 0;
    }
    #alert-list li.spike .badge { background: var(--warn); }
    #alert-list li .meta { color: var(--muted); }
    #alert-list li .detail { color: var(--text); }

    #alert-list:empty::after { content: 'No alerts yet.'; color: var(--muted); font-size: .85rem; }

    @media (max-width: 900px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Net<span>Analyzer</span></h1>
  <span id="status">connecting…</span>
</header>

<main>
  <!-- stat cards -->
  <div class="grid-3">
    <div class="card">
      <h2>Total Packets</h2>
      <div class="stat-val" id="stat-packets">—</div>
      <div class="stat-label">captured</div>
    </div>
    <div class="card">
      <h2>Alerts</h2>
      <div class="stat-val" id="stat-alerts" style="color:var(--danger)">—</div>
      <div class="stat-label">total anomalies</div>
    </div>
    <div class="card">
      <h2>Top Protocol</h2>
      <div class="stat-val" id="stat-proto">—</div>
      <div class="stat-label">by packet count</div>
    </div>
  </div>

  <!-- charts row -->
  <div class="grid-2">
    <div class="card">
      <h2>Protocol Breakdown</h2>
      <canvas id="chart-protocols"></canvas>
    </div>
    <div class="card">
      <h2>Traffic Timeline (10 min)</h2>
      <canvas id="chart-timeline"></canvas>
    </div>
  </div>

  <!-- bottom row -->
  <div class="grid-2">
    <div class="card">
      <h2>Top Source IPs</h2>
      <table>
        <thead><tr><th>#</th><th>IP Address</th><th>Packets</th></tr></thead>
        <tbody id="ip-table"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>Recent Alerts</h2>
      <ul id="alert-list"></ul>
    </div>
  </div>
</main>

<script src="/static/charts.js"></script>
</body>
</html>
